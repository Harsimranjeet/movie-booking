server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**

        - id: movie-service
          uri: lb://movie-service
          predicates:
            - Path=/api/v1/movies/**

        - id: theatre-service
          uri: lb://theatre-service
          predicates:
            - Path=/api/v1/theatres/**

        - id: show-service
          uri: lb://show-service
          predicates:
            - Path=/api/v1/shows/**

        - id: seat-service
          uri: lb://seat-service
          predicates:
            - Path=/api/v1/seats/**

        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/v1/bookings/**

        - id: payment-service
          uri: lb://payment-service
          predicates:
            - Path=/api/v1/payments/**

        - id: offer-service
          uri: lb://offer-service
          predicates:
            - Path=/api/v1/offers/**

        # ── Swagger API-docs routes (one per service) ──────────────────────
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/docs/user-service/**
          filters:
            - RewritePath=/docs/user-service/(?<remaining>.*), /${remaining}

        - id: booking-service-docs
          uri: lb://booking-service
          predicates:
            - Path=/docs/booking-service/**
          filters:
            - RewritePath=/docs/booking-service/(?<remaining>.*), /${remaining}

        - id: show-service-docs
          uri: lb://show-service
          predicates:
            - Path=/docs/show-service/**
          filters:
            - RewritePath=/docs/show-service/(?<remaining>.*), /${remaining}

        - id: seat-service-docs
          uri: lb://seat-service
          predicates:
            - Path=/docs/seat-service/**
          filters:
            - RewritePath=/docs/seat-service/(?<remaining>.*), /${remaining}

        - id: payment-service-docs
          uri: lb://payment-service
          predicates:
            - Path=/docs/payment-service/**
          filters:
            - RewritePath=/docs/payment-service/(?<remaining>.*), /${remaining}

        - id: offer-service-docs
          uri: lb://offer-service
          predicates:
            - Path=/docs/offer-service/**
          filters:
            - RewritePath=/docs/offer-service/(?<remaining>.*), /${remaining}

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:mySecretKeyForMovieBookingPlatformMinimum256BitsLong}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: User Service
        url: /docs/user-service/v3/api-docs
      - name: Booking Service
        url: /docs/booking-service/v3/api-docs
      - name: Show Service
        url: /docs/show-service/v3/api-docs
      - name: Seat Service
        url: /docs/seat-service/v3/api-docs
      - name: Payment Service
        url: /docs/payment-service/v3/api-docs
      - name: Offer Service
        url: /docs/offer-service/v3/api-docs
